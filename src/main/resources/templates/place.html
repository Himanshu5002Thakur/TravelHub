<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title},~{::body})}">

<head>
<title th:text="${place} + ' Packages'">Packages</title>
</head>

<body>

<!-- PAGE TITLE -->

<div class="row mb-4">

<div class="col-12 text-center">

<h1 class="text-info fw-bold">
<i class="fas fa-suitcase-rolling"></i>
Tour Packages for <span th:text="${place}"></span>
</h1>

<p class="text-muted">
Discover exciting travel plans and itineraries.
</p>

</div>

</div>


<!-- DESTINATION IMAGE -->

<div class="row mb-4">

<div class="col-md-12">

<img th:src="@{'/images/' + ${place.toLowerCase().replace(' ','')} + '.jpg'}"
     class="img-fluid rounded shadow"
     style="width:100%; max-height:350px; object-fit:cover;">

</div>

</div>


<!-- PACKAGE DETAILS -->

<div class="row g-4">

<!-- ITINERARY -->

<div class="col-md-8">

<div class="card shadow border-0">

<div class="card-header bg-info text-white">

<h5 class="mb-0">
<i class="fas fa-calendar-alt"></i>
Travel Itinerary
</h5>

</div>

<div class="card-body">

<pre style="white-space:pre-wrap; font-family:inherit;"
     th:text="${packageContent}">
Package details...
</pre>

</div>

</div>

</div>


<!-- PRICE / BOOKING -->

<div class="col-md-4">

<div class="card shadow border-0">

<div class="card-header bg-success text-white text-center">

<h5 class="mb-0">
<i class="fas fa-tags"></i>
Special Offer
</h5>

</div>

<div class="card-body text-center">

<h3 class="text-success fw-bold">
$399
</h3>

<p class="text-muted">
Per Person
</p>

<div class="mb-3 text-warning">

<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star-half-alt"></i>

</div>

<a th:href="@{/booking/traveller/{place}(place=${place})}"
   class="btn btn-warning w-100 mb-2">
<i class="fas fa-bookmark"></i> Book Now
</a>

<a th:href="@{/home}" class="btn btn-outline-secondary w-100">

<i class="fas fa-arrow-left"></i>
Back to Home

</a>

</div>

</div>

</div>

</div>

</body>
</html>
