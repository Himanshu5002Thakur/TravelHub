<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title,content)">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title th:replace="${title}">TravelHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family: 'Poppins', sans-serif;
}

.card:hover{
transform: scale(1.03);
transition: 0.3s;
}
</style>

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

<div class="container">

<a class="navbar-brand fw-bold" th:href="@{/home}">
<i class="fas fa-plane"></i> TravelHub
</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" th:href="@{/home}">
<i class="fas fa-home"></i> Home
</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/contact}">
<i class="fas fa-envelope"></i> Contact
</a>
</li>

<li class="nav-item">
<a class="nav-link" th:href="@{/about}">
<i class="fas fa-info-circle"></i> About
</a>
</li>

<!-- Logged-in Username -->
<li class="nav-item">
<span class="navbar-text text-white me-3">
<i class="fas fa-user"></i>
<span sec:authentication="name"></span>
</span>
</li>

<li class="nav-item">

<form th:action="@{/logout}" method="post" class="d-inline">

<button type="submit" class="nav-link btn btn-link text-warning">
<i class="fas fa-sign-out-alt"></i> Logout
</button>

</form>

</li>

</ul>

</div>

</div>

</nav>

<div class="container mt-5 mb-5" th:replace="${content}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<footer class="bg-dark text-white mt-5 pt-4 pb-3">

<div class="container">

<div class="row">

<div class="col-md-4">
<h5>TravelHub</h5>
<p class="text-muted">
Explore the world with our curated travel packages.
</p>
</div>

<div class="col-md-4">
<h5>Quick Links</h5>
<ul class="list-unstyled">
<li><a th:href="@{/home}" class="text-white">Home</a></li>
<li><a th:href="@{/about}" class="text-white">About</a></li>
<li><a th:href="@{/contact}" class="text-white">Contact</a></li>
</ul>
</div>

<div class="col-md-4">
<h5>Follow Us</h5>

<i class="fab fa-facebook fa-lg me-2"></i>
<i class="fab fa-instagram fa-lg me-2"></i>
<i class="fab fa-twitter fa-lg"></i>

</div>

</div>

<hr class="bg-light">

<p class="text-center mb-0">
© 2026 TravelHub. All rights reserved.
</p>

</div>

</footer>

</body>
</html>
