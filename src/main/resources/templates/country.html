<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title},~{::body})}">

<head>
<title th:text="${country} + ' Destinations'">Country</title>
</head>

<body>

<!-- TITLE SECTION -->

<div class="row mb-4">

<div class="col-12 text-center">

<h1 class="text-success fw-bold">
<i class="fas fa-map"></i>
Top Places in <span th:text="${country}"></span>
</h1>

<p class="text-muted">
Discover amazing destinations and travel packages.
</p>

</div>

</div>


<!-- PLACES -->

<div class="row g-4">

<div th:each="place : ${places}" class="col-md-3">

<div class="card h-100 shadow border-0">

<!-- IMAGE -->

<img th:src="@{'/images/' + ${place.toLowerCase().replace(' ','')} + '.jpg'}"
     class="card-img-top"
     style="height:180px; object-fit:cover;">

<div class="card-body text-center">

<h5 class="fw-bold" th:text="${place}"></h5>

<p class="text-muted small">
View tour packages and travel plans.
</p>

<a th:href="@{/place/{id}(id=${place})}"
   class="btn btn-success w-100">

<i class="fas fa-suitcase-rolling"></i>
View Packages

</a>

</div>

</div>

</div>

</div>


<!-- BACK BUTTON -->

<div class="text-center mt-5">

<a th:href="@{/home}" class="btn btn-outline-secondary">

<i class="fas fa-arrow-left"></i>
Back to Home

</a>

</div>

</body>
</html>
