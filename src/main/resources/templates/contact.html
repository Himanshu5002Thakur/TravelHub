<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title},~{::body})}">

<head>
<title>Contact Us</title>
</head>

<body>

<div class="text-center mb-4">
    <h1 class="text-primary fw-bold">
        <i class="fas fa-envelope"></i> Contact Us
    </h1>
    <p class="text-muted">
        Have questions about your trip? Fill out the form below!
    </p>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-body p-4">

                <form id="contactForm">
                    <input type="text" class="form-control mb-3" placeholder="Your Name" required>
                    <input type="email" class="form-control mb-3" placeholder="Your Email" required>
                    <textarea class="form-control mb-3" rows="4" placeholder="Your Message" required></textarea>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>

                <!-- Popup alert -->
                <div id="successAlert" class="alert alert-success alert-dismissible fade show mt-3 d-none" role="alert">
                    <strong>Success!</strong> Your message has been sent.
                    <button type="button" class="btn-close" onclick="hideAlert()" aria-label="Close"></button>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('contactForm');
    const alertBox = document.getElementById('successAlert');

    form.addEventListener('submit', function(e) {
        e.preventDefault(); // prevent actual form submission
        alertBox.classList.remove('d-none'); // show success alert
        form.reset(); // clear form fields
    });

    function hideAlert() {
        alertBox.classList.add('d-none');
    }
</script>

<div class="text-center mt-4 text-muted">
    <p>
        <strong>Email:</strong> honey14052005@gmail.com |
        <strong>Phone:</strong> +91-9015409405
    </p>
</div>

</body>
</html>
