<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{base :: layout(~{::title},~{::body})}">

<head>
<title>TravelHub | Home</title>
</head>

<body>

<!-- HERO SECTION -->

<div class="p-5 mb-5 text-center bg-dark text-white rounded shadow"
     style="background:url('/images/travel-banner.jpg') center/cover no-repeat; min-height:300px; display:flex; align-items:center; justify-content:center;">

<div style="background:rgba(0,0,0,0.5); padding:30px; border-radius:10px;">

<h1 class="display-4 fw-bold">
<i class="fas fa-plane-departure"></i> TravelHub
</h1>

<p class="lead">
Discover the world’s most beautiful destinations.
</p>

</div>

</div>


<!-- COUNTRIES -->

<div class="row mb-4">

<div class="col-12 text-center">

<h2 class="text-primary fw-bold">
<i class="fas fa-globe"></i> Choose Your Destination
</h2>

<p class="text-muted">
Select a country and explore amazing places.
</p>

</div>

</div>


<div class="row g-4">

<div th:each="country : ${countries}" class="col-md-3">

<div class="card h-100 shadow border-0">

<!-- IMAGE -->

<img th:src="@{'/images/' + ${country.toLowerCase()} + '.jpg'}"
     class="card-img-top"
     style="height:180px; object-fit:cover;">

<div class="card-body text-center">

<h5 class="fw-bold" th:text="${country}">Country</h5>

<p class="text-muted small">
Explore top destinations and tour packages.
</p>

<a th:href="@{/country/{id}(id=${country})}"
   class="btn btn-primary w-100">

<i class="fas fa-compass"></i> Explore

</a>

</div>

</div>

</div>

</div>

</body>
</html>
