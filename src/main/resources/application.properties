# Server (embedded Tomcat)
server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/traveldb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate (auto-creates tables if needed)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf (for UI templates)
spring.thymeleaf.cache=false


# Logging (helps debug)
logging.level.org.springframework.security=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

# Add these for startup stability
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

server.error.include-message=always
server.error.include-stacktrace=always

